[pytest]
# PyTest Configuration for TeXTile Backend

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests
norecursedirs = .venv .git node_modules

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_scope = function

# Markers for test organization
markers =
    unit: Unit tests (services, utilities)
    integration: Integration tests (routers, database)
    e2e: End-to-end tests (complete workflows)
    slow: Slow tests (>1 second)
    requires_tectonic: Tests requiring Tectonic LaTeX compiler
    requires_ollama: Tests requiring Ollama AI service

# Output and reporting
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage configuration (when using pytest-cov)
# Run with: pytest --cov=app --cov-report=html

# Timeout for tests (prevents hanging tests)
timeout = 30
timeout_method = thread

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = test.log
log_file_level = DEBUG
